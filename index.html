<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>コンサルティングファーム Webテスト 練習問題</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg:#f0f2f7; --bg-card:#fff; --bg-hover:#e8ebf4;
  --bg-dark:#2a3f8f; --bg-dark-hover:#1e3080;
  --text:#1c2340; --muted:#7a85a3; --faint:#9aa4be;
  --divider:#dde2f0;
  --green-bg:#e8f5ee; --green:#1a7a45;
  --red-bg:#fbeaea;   --red:#b91c1c;
  --accent:#2a3f8f;
  --r:8px;
}
body { font-family:'Noto Sans JP','Hiragino Sans','Yu Gothic UI',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; font-size:15px; line-height:1.6; -webkit-font-smoothing:antialiased; }
.wrap { max-width:580px; margin:0 auto; padding:0 20px 80px; }
.screen { display:none; }
.screen.active { display:block; }
.label { font-size:10px; font-weight:700; letter-spacing:0.12em; text-transform:uppercase; color:var(--faint); }
.sep { height:1px; background:var(--divider); margin:0 0 28px; }

/* ── SELECT (テスト種別選択) ── */
.sel-nav { padding:32px 0 0; }
.sel-hero { padding:44px 0 36px; }
.sel-hero h1 { font-family:'Noto Sans JP',sans-serif; font-size:26px; font-weight:800; line-height:1.35; color:var(--text); margin-bottom:12px; letter-spacing:-0.3px; }
.sel-hero p { font-size:13px; color:var(--muted); line-height:1.9; }

.test-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:12px; }
.test-card {
  background:var(--bg-card); border:1.5px solid var(--divider); border-radius:var(--r);
  padding:20px 18px; cursor:pointer; transition:border-color 0.12s,background 0.12s;
  text-align:left;
}
.test-card:hover { border-color:#b0bcd8; background:var(--bg-hover); }
.test-card-name { font-family:'Noto Sans JP',sans-serif; font-size:15px; font-weight:700; color:var(--text); margin-bottom:5px; }
.test-card-desc { font-size:11px; color:var(--muted); line-height:1.7; }
.test-card-tags { display:flex; gap:5px; margin-top:10px; flex-wrap:wrap; }
.tag { font-size:10px; font-weight:700; background:var(--bg); color:var(--accent); padding:2px 7px; border-radius:4px; letter-spacing:0.04em; border:1px solid var(--divider); }

.top-foot { margin-top:20px; font-size:11px; color:var(--faint); text-align:center; line-height:1.8; }
.top-foot a { color:var(--muted); text-decoration:none; border-bottom:1px solid var(--divider); }

/* ── TOP (科目選択) ── */
.back-btn {
  display:inline-flex; align-items:center; gap:6px;
  font-size:11px; font-weight:700; color:var(--faint);
  cursor:pointer; padding:32px 0 0; letter-spacing:0.06em;
  text-transform:uppercase; background:none; border:none;
  font-family:inherit; transition:color 0.1s;
}
.back-btn:hover { color:var(--muted); }
.top-hero { padding:32px 0 28px; }
.top-hero h1 { font-family:'Noto Sans JP',sans-serif; font-size:24px; font-weight:800; line-height:1.35; color:var(--text); margin-bottom:8px; letter-spacing:-0.3px; }
.top-hero p { font-size:13px; color:var(--muted); line-height:1.9; }

.cat-grid { display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-bottom:28px; }
.cat-card {
  background:var(--bg-card); border:1.5px solid var(--divider); border-radius:var(--r);
  padding:18px 16px; cursor:pointer; transition:border-color 0.12s,background 0.12s; position:relative;
}
.cat-card:hover { border-color:#b0bcd8; background:var(--bg-hover); }
.cat-card.selected { background:var(--bg-dark); border-color:var(--bg-dark); }
.cat-check {
  position:absolute; top:14px; right:14px; width:16px; height:16px; border-radius:50%;
  background:rgba(255,255,255,0.2); display:flex; align-items:center; justify-content:center;
  opacity:0; transition:opacity 0.12s;
}
.cat-card.selected .cat-check { opacity:1; }
.cat-check::after { content:''; width:6px; height:4px; border-left:1.5px solid #fff; border-bottom:1.5px solid #fff; transform:rotate(-45deg) translateY(-1px); display:block; }
.cat-icon { font-size:18px; margin-bottom:8px; }
.cat-name { font-size:13px; font-weight:700; color:var(--text); margin-bottom:3px; }
.cat-card.selected .cat-name { color:#fff; }
.cat-sub { font-size:11px; color:var(--faint); }
.cat-card.selected .cat-sub { color:#8898d0; }

.mode-row { display:flex; gap:6px; margin-bottom:28px; flex-wrap:wrap; }
.mode-btn { background:var(--bg-card); border:1.5px solid var(--divider); border-radius:6px; padding:8px 16px; font-size:12px; font-weight:600; cursor:pointer; color:var(--muted); font-family:inherit; transition:background 0.12s,color 0.12s,border-color 0.12s; }
.mode-btn:hover { background:var(--bg-hover); color:var(--text); border-color:#b0bcd8; }
.mode-btn.selected { background:var(--bg-dark); color:#fff; border-color:var(--bg-dark); }

.start-btn { display:block; width:100%; padding:15px; background:var(--bg-dark); color:#fff; border:none; border-radius:var(--r); font-size:14px; font-weight:700; cursor:pointer; font-family:inherit; letter-spacing:0.02em; transition:background 0.12s; }
.start-btn:hover { background:var(--bg-dark-hover); }
.start-btn:disabled { background:var(--divider); color:var(--faint); cursor:not-allowed; }

/* ── EXAM ── */
.exam-top { display:flex; align-items:center; justify-content:space-between; padding:28px 0 16px; }
.exam-top-l { display:flex; align-items:center; gap:10px; }
.q-count { font-size:12px; font-weight:700; color:var(--text); }
.q-cat-tag { font-size:10px; font-weight:700; letter-spacing:0.08em; background:var(--bg-card); color:var(--muted); padding:3px 8px; border-radius:4px; border:1px solid var(--divider); }
.timer { font-size:12px; font-weight:700; color:var(--faint); font-variant-numeric:tabular-nums; }
.timer.warn { color:#c0392b; }
.prog { height:2px; background:var(--divider); margin-bottom:36px; }
.prog-fill { height:100%; background:var(--bg-dark); transition:width 0.3s; }
.q-text { font-family:'Noto Sans JP',sans-serif; font-size:17px; font-weight:700; color:var(--text); line-height:1.7; margin-bottom:24px; }
.q-passage { font-size:13px; color:var(--muted); line-height:1.9; background:var(--bg-card); border-radius:var(--r); padding:16px; margin-bottom:20px; border-left:2px solid var(--divider); }
.choices { display:flex; flex-direction:column; gap:7px; margin-bottom:24px; }
.choice { display:flex; align-items:flex-start; gap:13px; padding:13px 15px; background:var(--bg-card); border:1.5px solid var(--divider); border-radius:var(--r); cursor:pointer; transition:border-color 0.1s,background 0.1s; }
.choice:hover { border-color:#b0bcd8; background:var(--bg-hover); }
.choice.selected { background:var(--bg-dark); border-color:var(--bg-dark); }
.choice.correct { background:var(--green-bg); border-color:#6fcf97; }
.choice.wrong   { background:var(--red-bg); border-color:#e88; }
.choice-lbl { width:22px; height:22px; border-radius:50%; background:var(--divider); display:flex; align-items:center; justify-content:center; font-size:10px; font-weight:800; color:var(--faint); flex-shrink:0; margin-top:1px; }
.choice.selected .choice-lbl { background:rgba(255,255,255,0.2); color:#fff; }
.choice.correct  .choice-lbl { background:var(--green); color:#fff; }
.choice.wrong    .choice-lbl { background:var(--red);   color:#fff; }
.choice-txt { font-size:14px; font-family:'Noto Sans JP','Hiragino Sans','Yu Gothic UI',sans-serif; color:var(--text); line-height:1.6; padding-top:2px; }
.choice.selected .choice-txt { color:#fff; }
.choice.correct  .choice-txt { color:var(--green); font-weight:600; }
.choice.wrong    .choice-txt { color:var(--red); }
.explanation { background:var(--bg-card); border-radius:var(--r); padding:16px; margin-bottom:24px; display:none; border-left:2px solid var(--accent); }
.exp-lbl { font-size:10px; font-weight:700; letter-spacing:0.1em; color:var(--accent); margin-bottom:7px; }
.exp-body { font-size:13px; color:var(--muted); line-height:1.85; }
.exam-nav { display:flex; justify-content:space-between; align-items:center; }
.btn-sub { padding:10px 18px; background:var(--bg-card); border:1.5px solid var(--divider); border-radius:var(--r); font-size:12px; font-weight:600; cursor:pointer; color:var(--muted); font-family:inherit; transition:background 0.1s,color 0.1s; }
.btn-sub:hover:not(:disabled) { background:var(--bg-hover); color:var(--text); }
.btn-sub:disabled { opacity:0.4; cursor:not-allowed; }
.btn-main { padding:10px 22px; background:var(--bg-dark); border:none; border-radius:var(--r); font-size:12px; font-weight:700; color:#fff; cursor:pointer; font-family:inherit; transition:background 0.1s; }
.btn-main:hover:not(:disabled) { background:var(--bg-dark-hover); }
.btn-main:disabled { background:var(--divider); color:var(--faint); cursor:not-allowed; }
.confirm-bar { margin-bottom:16px; display:none; }
.btn-confirm { display:block; width:100%; padding:14px; background:var(--bg-dark); color:#fff; border:none; border-radius:var(--r); font-size:14px; font-weight:700; cursor:pointer; font-family:inherit; transition:background 0.1s; }
.btn-confirm:hover { background:var(--bg-dark-hover); }

/* ── RESULT ── */
.result-head { padding:40px 0 32px; }
.score-line { display:flex; align-items:baseline; gap:6px; margin-bottom:6px; }
.score-n { font-family:'Noto Sans JP',sans-serif; font-size:60px; font-weight:800; color:var(--text); line-height:1; letter-spacing:-2px; }
.score-pct { font-size:20px; font-weight:700; color:var(--faint); }
.verdict { font-size:13px; color:var(--muted); margin-top:4px; }
.stats-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; margin:28px 0; }
.s-cell { background:var(--bg-card); border:1.5px solid var(--divider); border-radius:var(--r); padding:16px 12px; text-align:center; }
.s-n { font-size:22px; font-weight:800; color:var(--text); font-variant-numeric:tabular-nums; }
.s-l { font-size:10px; font-weight:700; letter-spacing:0.08em; color:var(--faint); margin-top:4px; text-transform:uppercase; }
.sec-ttl { font-size:10px; font-weight:700; letter-spacing:0.12em; color:var(--accent); text-transform:uppercase; margin:32px 0 12px; padding-bottom:10px; border-bottom:1px solid var(--divider); }
.w-list { display:flex; flex-direction:column; gap:8px; }
.w-item { background:var(--bg-card); border:1.5px solid var(--divider); border-radius:var(--r); padding:16px; }
.w-top { display:flex; justify-content:space-between; align-items:baseline; margin-bottom:10px; }
.w-name { font-size:13px; font-weight:700; color:var(--text); }
.w-pct { font-size:20px; font-weight:800; font-variant-numeric:tabular-nums; }
.bar-bg { height:2px; background:var(--divider); border-radius:1px; }
.bar-fill { height:100%; border-radius:1px; }
.w-tip { font-size:12px; color:var(--muted); margin-top:12px; line-height:1.8; }
.r-list { display:flex; flex-direction:column; gap:8px; }
.r-item { background:var(--bg-card); border:1.5px solid var(--divider); border-radius:var(--r); padding:16px; }
.r-item.r-correct { border-color:#6fcf97; }
.r-item.r-wrong   { border-color:#e88; }
.r-badge { display:inline-flex; align-items:center; gap:5px; font-size:10px; font-weight:700; letter-spacing:0.06em; padding:3px 9px; border-radius:20px; margin-bottom:10px; }
.r-badge.correct { background:var(--green-bg); color:var(--green); }
.r-badge.wrong   { background:var(--red-bg); color:var(--red); }
.r-q { font-family:'Noto Sans JP',sans-serif; font-size:13px; font-weight:700; color:var(--text); line-height:1.7; margin-bottom:10px; }
.r-row { font-size:12px; padding:5px 10px; border-radius:5px; margin-bottom:4px; }
.r-row.w { background:var(--red-bg); color:var(--red); }
.r-row.c { background:var(--green-bg); color:var(--green); }
.r-exp { font-size:12px; color:var(--muted); margin-top:10px; line-height:1.8; padding-top:10px; border-top:1px solid var(--divider); }
.retry-btn { display:block; width:100%; max-width:180px; margin:16px auto 0; padding:11px; background:var(--bg-dark); color:#fff; border:none; border-radius:var(--r); font-size:12px; font-weight:700; cursor:pointer; font-family:inherit; transition:background 0.1s; }
.retry-btn:hover { background:var(--bg-dark-hover); }
.back-top-btn { display:block; width:100%; max-width:180px; margin:8px auto 0; padding:11px; background:transparent; color:var(--faint); border:none; border-radius:var(--r); font-size:12px; font-weight:600; cursor:pointer; font-family:inherit; transition:color 0.1s; }
.back-top-btn:hover { color:var(--muted); }
.cta-box { margin-top:32px; background:var(--bg-dark); border-radius:12px; padding:28px 24px; text-align:center; }
.cta-box-label { font-size:10px; font-weight:700; letter-spacing:0.12em; text-transform:uppercase; color:#8898d0; margin-bottom:12px; }
.cta-box-title { font-family:'Noto Sans JP',sans-serif; font-size:17px; font-weight:700; color:#fff; line-height:1.55; margin-bottom:10px; }
.cta-box-desc { font-size:12px; color:#8898d0; line-height:1.8; margin-bottom:20px; }
.cta-box-btn { display:inline-block; padding:12px 28px; background:#fff; color:var(--bg-dark); border:none; border-radius:var(--r); font-size:13px; font-weight:700; cursor:pointer; font-family:inherit; text-decoration:none; transition:opacity 0.1s; }
.cta-box-btn:hover { opacity:0.88; }

@media(max-width:460px){
  .test-grid { grid-template-columns:1fr; }
  .cat-grid  { grid-template-columns:1fr; }
  .score-n   { font-size:48px; }
}
</style>
</head>
<body>
<div class="wrap">

<!-- ① テスト種別選択 -->
<div id="screen-select" class="screen active">
  <div class="sel-nav label">練習問題</div>
  <div class="sel-hero">
    <h1>コンサルティングファーム<br>Webテスト 練習問題</h1>
    <p>受検するテストを選んでください。<br>科目ごとの出題傾向に合わせた問題で練習できます。</p>
  </div>
  <div class="sep"></div>
  <div class="label" style="margin-bottom:14px">テスト種別</div>
  <div class="test-grid" id="test-grid"></div>
  <div class="top-foot">
    コンサル転職の個別相談は
    <a href="https://docs.google.com/forms/d/e/1FAIpQLScYDoNKFaZW-jCvWLrN9g_p0aNCmbWbmjGjAGZYYBHlFscbEg/viewform" target="_blank">こちら</a> へ（無料）
  </div>
</div>

<!-- ② 科目選択 -->
<div id="screen-top" class="screen">
  <button class="back-btn" id="back-btn">← テスト選択に戻る</button>
  <div class="top-hero">
    <h1 id="top-title">SPI 模擬試験</h1>
    <p id="top-desc">科目を選んで開始してください。</p>
  </div>
  <div class="sep"></div>
  <div class="label" style="margin-bottom:12px">科目を選ぶ</div>
  <div class="cat-grid" id="cat-grid"></div>
  <div class="label" style="margin-bottom:10px">出題数</div>
  <div class="mode-row" id="mode-row">
    <button class="mode-btn selected" data-mode="quick">5問</button>
    <button class="mode-btn" data-mode="standard">10問</button>
    <button class="mode-btn" data-mode="full">20問</button>
  </div>
  <button class="start-btn" id="start-btn" disabled>科目を選択してください</button>
</div>

<!-- ③ 試験 -->
<div id="screen-exam" class="screen">
  <div class="exam-top">
    <div class="exam-top-l">
      <div class="q-count" id="q-count">問1 / 10</div>
      <div class="q-cat-tag" id="q-cat">言語</div>
    </div>
    <div class="timer" id="timer">2:00</div>
  </div>
  <div class="prog"><div class="prog-fill" id="prog-fill" style="width:10%"></div></div>
  <div class="q-passage" id="q-passage" style="display:none"></div>
  <div class="q-text" id="q-text"></div>
  <div class="choices" id="choices"></div>
  <div class="confirm-bar" id="confirm-bar">
    <button class="btn-confirm" id="btn-confirm">この回答で確定する</button>
  </div>
  <div class="explanation" id="explanation">
    <div class="exp-lbl">解説</div>
    <div class="exp-body" id="exp-body"></div>
  </div>
  <div class="exam-nav">
    <button class="btn-sub" id="btn-explain" disabled>解説を見る</button>
    <button class="btn-main" id="btn-next" disabled>次へ →</button>
  </div>
</div>

<!-- ④ 結果 -->
<div id="screen-result" class="screen">
  <div class="result-head">
    <div class="score-line">
      <div class="score-n" id="score-n">0</div>
      <div class="score-pct">%</div>
    </div>
    <div class="verdict" id="verdict"></div>
  </div>
  <div class="stats-grid">
    <div class="s-cell"><div class="s-n" id="st-c">0</div><div class="s-l">正解</div></div>
    <div class="s-cell"><div class="s-n" id="st-w">0</div><div class="s-l">不正解</div></div>
    <div class="s-cell"><div class="s-n" id="st-t">—</div><div class="s-l">平均時間</div></div>
  </div>
  <div class="sec-ttl">分野別スコア</div>
  <div class="w-list" id="w-list"></div>
  <div class="sec-ttl">復習</div>
  <div class="r-list" id="r-list"></div>
  <div class="cta-box">
    <div class="cta-box-label">Career Support</div>
    <div class="cta-box-title">コンサル転職の<br>キャリア面談を申し込む</div>
    <div class="cta-box-desc">弱点が見えたら、次はプロに相談してみませんか。<br>選考対策から内定まで無料でサポートします。</div>
    <a class="cta-box-btn" href="https://docs.google.com/forms/d/e/1FAIpQLScYDoNKFaZW-jCvWLrN9g_p0aNCmbWbmjGjAGZYYBHlFscbEg/viewform" target="_blank">無料面談を申し込む →</a>
  </div>
  <button class="retry-btn" id="retry-btn">もう一度解く</button>
  <button class="back-top-btn" id="back-top-btn">テスト選択に戻る</button>
</div>

</div>
<script>
// ─────────────────────────────────────────
// テスト種別定義
// ─────────────────────────────────────────
const TESTS = [
  {
    id:'common', name:'共通', desc:'テスト種別を問わず\n基礎力を確認',
    tags:['言語','非言語'],
    cats:[
      {id:'lang',    name:'言語（国語）',   icon:'📖', sub:'語彙・慣用句・敬語'},
      {id:'nonlang', name:'非言語（数学）', icon:'🔢', sub:'推論・速さ・確率'},
    ],
    tips:{
      lang:'語彙・慣用句集を活用し、新聞の社説を読む習慣をつけましょう。',
      nonlang:'式の立て方を重視した反復練習が効果的です。仕事算・確率・割合の頻出パターンを集中対策しましょう。',
    },
  },
  {
    id:'spi', name:'SPI', desc:'リクルート社の適性検査\nコンサル各社で広く採用',
    tags:['言語','非言語'],
    cats:[
      {id:'spi_lang',    name:'言語',   icon:'📖', sub:'二語関係・語句の用法・長文'},
      {id:'spi_nonlang', name:'非言語', icon:'🔢', sub:'推論・場合の数・速さ・割合'},
    ],
    tips:{
      spi_lang:'二語関係と語句の用法は頻出です。類義語・対義語・包含関係のパターンを整理しましょう。',
      spi_nonlang:'SPIの非言語は推論と場合の数の配点が高めです。条件整理を図にする習慣をつけましょう。',
    },
  },
  {
    id:'tama', name:'玉手箱', desc:'日本SHL社の適性検査\nMBB・外資系で多く採用',
    tags:['言語','計数'],
    cats:[
      {id:'tama_lang', name:'言語',   icon:'📖', sub:'長文読解・趣旨把握・READING'},
      {id:'tama_keisu',name:'計数',   icon:'🔢', sub:'四則逆算・図表読取・暗算'},
    ],
    tips:{
      tama_lang:'趣旨把握は「筆者が最も言いたいこと」を素早く掴む練習が重要です。本文の冒頭と末尾に注目しましょう。',
      tama_keisu:'四則逆算はスピードが命です。逆算パターンを反射的に処理できるよう繰り返し練習しましょう。',
    },
  },
  {
    id:'gab', name:'GAB', desc:'日本SHL社の総合適性検査\nコンサル・外資金融で採用',

// ─────────────────────────────────────────
// State
// ─────────────────────────────────────────
const MODE_N={quick:5,standard:10,full:20};
let currentTest=null, selCats=[], selMode='quick';
let qs=[], idx=0, ans=[], times=[], t0=0, tiv=null, tLeft=120, done=false;

function shuffle(a){return[...a].sort(()=>Math.random()-0.5);}

function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById('screen-'+id).classList.add('active');
  window.scrollTo(0,0);
}

// ─────────────────────────────────────────
// テスト種別選択画面
// ─────────────────────────────────────────
function buildSelectScreen(){
  const g=document.getElementById('test-grid');g.innerHTML='';
  TESTS.forEach(t=>{
    const d=document.createElement('button');d.className='test-card';
    const tagsHtml=t.tags.map(tg=>`<span class="tag">${tg}</span>`).join('');
    d.innerHTML=`<div class="test-card-name">${t.name}</div><div class="test-card-desc">${t.desc.replace('\n','<br>')}</div><div class="test-card-tags">${tagsHtml}</div>`;
    d.onclick=()=>selectTest(t.id);
    g.appendChild(d);
  });
}

function selectTest(id){
  currentTest=TESTS.find(t=>t.id===id);
  selCats=[];
  buildTopScreen();
  showScreen('top');
}

// ─────────────────────────────────────────
// 科目選択画面
// ─────────────────────────────────────────
function buildTopScreen(){
  document.getElementById('top-title').textContent=currentTest.name+' 模擬試験';
  document.getElementById('top-desc').textContent='科目を選んで開始してください。複数選択も可能です。';

  const g=document.getElementById('cat-grid');g.innerHTML='';
  currentTest.cats.forEach(c=>{
    const d=document.createElement('div');d.className='cat-card';
    d.innerHTML=`<div class="cat-check"></div><div class="cat-icon">${c.icon}</div><div class="cat-name">${c.name}</div><div class="cat-sub">${c.sub}</div>`;
    d.onclick=()=>{
      if(selCats.includes(c.id)){selCats=selCats.filter(x=>x!==c.id);d.classList.remove('selected');}
      else{selCats.push(c.id);d.classList.add('selected');}
      const b=document.getElementById('start-btn');
      b.disabled=!selCats.length;
      b.textContent=selCats.length?'模擬試験を開始する':'科目を選択してください';
    };
    g.appendChild(d);
  });

  // モードボタンリセット
  document.querySelectorAll('#mode-row .mode-btn').forEach((b,i)=>{
    b.classList.toggle('selected',i===0);
  });
  selMode='quick';
}

document.getElementById('back-btn').onclick=()=>{
  selCats=[];
  showScreen('select');
};

document.querySelectorAll('#mode-row .mode-btn').forEach(b=>{
  b.onclick=()=>{
    document.querySelectorAll('#mode-row .mode-btn').forEach(x=>x.classList.remove('selected'));
    b.classList.add('selected');selMode=b.dataset.mode;
  };
});

document.getElementById('start-btn').onclick=()=>{
  const n=MODE_N[selMode];
  let pool=[];
  selCats.forEach(c=>{if(QB[c])pool.push(...QB[c].map(q=>({...q,cat:c})));});
  pool=shuffle(pool);
  // 重複なし：バンク数を超える場合は出題数を制限
  qs=pool.slice(0,Math.min(n,pool.length));
  idx=0;ans=[];times=[];done=false;
  renderQ();showScreen('exam');
};

// ─────────────────────────────────────────
// 試験
// ─────────────────────────────────────────
function renderQ(){
  const q=qs[idx];done=false;pendingChoice=-1;
  document.getElementById('q-count').textContent=`問${idx+1} / ${qs.length}`;
  const catDef=currentTest.cats.find(c=>c.id===q.cat);
  document.getElementById('q-cat').textContent=catDef?.name||'';
  document.getElementById('prog-fill').style.width=((idx+1)/qs.length*100)+'%';

  const passEl=document.getElementById('q-passage');
  if(q.passage){passEl.textContent=q.passage;passEl.style.display='block';}
  else{passEl.style.display='none';}

  document.getElementById('q-text').textContent=q.q;
  document.getElementById('explanation').style.display='none';
  document.getElementById('exp-body').textContent='';
  document.getElementById('btn-explain').disabled=true;
  const nxt=document.getElementById('btn-next');
  nxt.textContent=idx===qs.length-1?'結果を見る':'次へ →';nxt.disabled=true;

  const ch=document.getElementById('choices');ch.innerHTML='';
  ['A','B','C','D'].forEach((l,i)=>{
    const d=document.createElement('div');d.className='choice';
    d.innerHTML=`<div class="choice-lbl">${l}</div><div class="choice-txt">${q.choices[i]}</div>`;
    d.onclick=()=>{if(!done)tempSelect(i);};
    ch.appendChild(d);
  });
  document.getElementById('confirm-bar').style.display='none';
  clearInterval(tiv);tLeft=120;t0=Date.now();
  tick();tiv=setInterval(tick,1000);
}

let pendingChoice = -1;

function tempSelect(i){
  if(done) return;
  pendingChoice = i;
  document.querySelectorAll('.choice').forEach((c,j)=>{
    c.classList.remove('selected');
    if(j===i) c.classList.add('selected');
  });
  const bar = document.getElementById('confirm-bar');
  bar.style.display='block';
}

document.getElementById('btn-confirm').onclick = () => {
  if(pendingChoice === -1 || done) return;
  pick(pendingChoice);
};

function tick(){
  tLeft--;
  const el=document.getElementById('timer');
  el.textContent=`${Math.floor(Math.max(0,tLeft)/60)}:${(Math.max(0,tLeft)%60).toString().padStart(2,'0')}`;
  el.classList.toggle('warn',tLeft<=30);
  if(tLeft<=0){clearInterval(tiv);pick(-1);}
}

function pick(i){
  if(done)return;done=true;clearInterval(tiv);
  pendingChoice=-1;
  document.getElementById('confirm-bar').style.display='none';
  times.push(Math.round((Date.now()-t0)/1000));ans.push(i);
  const q=qs[idx];
  document.querySelectorAll('.choice').forEach((c,j)=>{
    c.onclick=null;
    if(j===q.ans)c.classList.add('correct');
    if(j===i&&i!==q.ans)c.classList.add('wrong');
    if(j===i)c.classList.add('selected');
  });
  document.getElementById('btn-explain').disabled=false;
  document.getElementById('btn-next').disabled=false;
}

document.getElementById('btn-explain').onclick=()=>{
  document.getElementById('exp-body').textContent=qs[idx].exp;
  document.getElementById('explanation').style.display='block';
};
document.getElementById('btn-next').onclick=()=>{
  if(!done) return;
  if(++idx>=qs.length){showResult();return;}
  renderQ();
};

// ─────────────────────────────────────────
// 結果
// ─────────────────────────────────────────
function showResult(){
  const cor=ans.filter((a,i)=>a===qs[i].ans).length;
  const pct=Math.round(cor/qs.length*100);
  const avg=times.length?Math.round(times.reduce((a,b)=>a+b,0)/times.length):0;
  document.getElementById('score-n').textContent=pct;
  document.getElementById('verdict').textContent=
    pct>=80?`${cor}/${qs.length}正解 — 合格水準`:
    pct>=60?`${cor}/${qs.length}正解 — あと一歩`:
    `${cor}/${qs.length}正解 — 重点対策が必要`;
  document.getElementById('st-c').textContent=cor;
  document.getElementById('st-w').textContent=qs.length-cor;
  document.getElementById('st-t').textContent=avg+'秒';

  const cs={};
  selCats.forEach(c=>{cs[c]={t:0,c:0};});
  qs.forEach((q,i)=>{cs[q.cat].t++;if(ans[i]===q.ans)cs[q.cat].c++;});

  const wl=document.getElementById('w-list');wl.innerHTML='';
  Object.entries(cs).sort((a,b)=>(a[1].c/Math.max(1,a[1].t))-(b[1].c/Math.max(1,b[1].t))).forEach(([id,s])=>{
    if(!s.t)return;
    const cat=currentTest.cats.find(c=>c.id===id);
    const p=Math.round(s.c/s.t*100);
    const col=p>=70?'#1a7a45':p>=50?'#b45309':'#b91c1c';
    const tip=currentTest.tips[id]||'';
    const d=document.createElement('div');d.className='w-item';
    d.innerHTML=`<div class="w-top"><div class="w-name">${cat?.name}</div><div class="w-pct" style="color:${col}">${p}%</div></div><div class="bar-bg"><div class="bar-fill" style="width:${p}%;background:${col}"></div></div>${p<80?`<div class="w-tip">${tip}</div>`:'<div class="w-tip" style="color:#1a7a45">この分野は合格水準です。</div>'}`;
    wl.appendChild(d);
  });

  const rl=document.getElementById('r-list');rl.innerHTML='';
  const lb=['A','B','C','D'];
  qs.forEach((q,i)=>{
    const isCorrect=ans[i]===q.ans;
    const d=document.createElement('div');
    d.className='r-item '+(isCorrect?'r-correct':'r-wrong');
    const ya=ans[i]>=0?q.choices[ans[i]]:'（未回答）';
    const badgeHtml=isCorrect
      ? `<div class="r-badge correct">✓ 正解</div>`
      : `<div class="r-badge wrong">✗ 不正解</div>`;
    const answerHtml=isCorrect
      ? `<div class="r-row c">正解 — ${lb[q.ans]}  ${q.choices[q.ans]}</div>`
      : `<div class="r-row w">あなたの回答 — ${lb[Math.max(0,ans[i])]}  ${ya}</div><div class="r-row c">正解 — ${lb[q.ans]}  ${q.choices[q.ans]}</div>`;
    d.innerHTML=`${badgeHtml}<div class="r-q">${i+1}. ${q.q}</div>${answerHtml}<div class="r-exp">${q.exp}</div>`;
    rl.appendChild(d);
  });

  showScreen('result');
}

document.getElementById('retry-btn').onclick=()=>{buildTopScreen();showScreen('top');};
document.getElementById('back-top-btn').onclick=()=>showScreen('select');

// 初期化
buildSelectScreen();
</script>
</body>
